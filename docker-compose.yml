services:
  app:
    build: ./docker/php
    container_name: sta_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    expose:
      - "9000"
    cap_add:
      - NET_RAW

  nginx:
    image: nginx:alpine
    container_name: sta_nginx
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html
      - ./docker/php/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
